<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>禅オフィス | SHOOTER</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Noto Serif JP', 'Zen Old Mincho', serif;
      background: #0a0e1a;
      color: #c8d8e8;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(200,220,255,0.015) 2px, rgba(200,220,255,0.015) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(200,220,255,0.01) 3px, rgba(200,220,255,0.01) 5px);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 10px 20px 40px;
      position: relative;
      z-index: 1;
    }
    .jpattern-top {
      height: 16px;
      background: radial-gradient(circle at 8px 8px, #3a7ab5 3px, transparent 4px);
      background-size: 16px 16px;
      opacity: 0.5;
      margin-bottom: 5px;
    }
    .header {
      text-align: center;
      padding: 15px 10px;
      border: 3px double #1a3a6b;
      background: linear-gradient(180deg, rgba(5,10,20,0.95), rgba(3,8,15,0.95));
      margin-bottom: 15px;
    }
    .header h1 {
      font-family: 'Zen Old Mincho', serif;
      font-size: 32px;
      margin: 5px 0;
      color: #d0e0f0;
      text-shadow: 2px 2px 0 #00204a, 0 0 40px rgba(26,58,107,0.3);
      letter-spacing: 10px;
    }
    .header .sub { font-size: 13px; color: #6a8ab5; letter-spacing: 3px; }
    .nav {
      text-align: center;
      margin: 12px 0;
      padding: 10px 8px;
      border-top: 2px solid #2a3a5a;
      border-bottom: 2px solid #2a3a5a;
      background: rgba(3,8,15,0.6);
    }
    .nav a:not(.nav-btn):not(.flag-btn) {
      display: inline-block;
      color: #8ab5d4;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 2px;
      margin: 3px 8px;
      padding: 3px 6px;
      border: 1px solid transparent;
      transition: 0.2s;
    }
    .nav a:hover {
      color: #d0e0f0;
      border-color: #1a3a6b;
      background: rgba(26,58,107,0.2);
    }
    .nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px; padding: 0;
      font-size: 1.1rem; line-height: 1;
      border-radius: 999px; transition: 0.2s;
      cursor: pointer; text-decoration: none;
      border: 2px solid rgba(26,58,107,0.3);
      background: rgba(26,58,107,0.1);
      color: #8ab5d4; vertical-align: middle; margin: 0 3px;
    }
    .nav-btn:hover {
      transform: translateY(-2px);
      background: rgba(26,58,107,0.25);
      border-color: #1a3a6b;
      color: #d0e0f0;
    }
    .flag-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px; padding: 0;
      font-size: 1.2rem; line-height: 1;
      border-radius: 999px; transition: 0.2s;
      cursor: pointer; text-decoration: none;
      border: 2px solid rgba(26,58,107,0.3);
      background: rgba(26,58,107,0.1);
      vertical-align: middle; margin: 0 3px;
    }
    .flag-btn:hover {
      transform: translateY(-2px);
      background: rgba(26,58,107,0.25);
      border-color: #1a3a6b;
    }
    .gif-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0;
    }
    .gif-inline {
      display: inline-block;
      vertical-align: middle;
      margin: 0 4px;
      image-rendering: pixelated;
    }
    .game-section { text-align: center; margin: 15px 0; }
    .game-wrap {
      display: inline-block;
      padding: 15px;
      border: 2px solid #2a3a5a;
      background: rgba(5,8,15,0.85);
    }
    .game-title {
      font-family: 'Zen Old Mincho', serif;
      font-size: 14px;
      color: #6a8ab5;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }
    .game-canvas-wrap {
      display: inline-block;
      border: 2px solid #1a2a3a;
      line-height: 0;
    }
    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      cursor: crosshair;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 13px;
      letter-spacing: 2px;
    }
    .hud-score { color: #d0e0f0; }
    .hud-hp { color: #3a7ab5; }
    .hud-wave { color: #6a8ab5; }
    .hud-controls {
      font-size: 10px;
      color: #2a3a5a;
      letter-spacing: 1px;
      margin-top: 4px;
    }
    .game-over-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(5,8,15,0.85);
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }
    .game-over-overlay.show { opacity: 1; pointer-events: auto; }
    .go-title {
      font-family: 'Zen Old Mincho', serif;
      font-size: 28px;
      color: #3a7ab5;
      letter-spacing: 8px;
      text-shadow: 0 0 30px rgba(26,58,107,0.5);
    }
    .go-score {
      font-size: 16px;
      color: #8ab5d4;
      margin: 12px 0;
      letter-spacing: 3px;
    }
    .go-btn {
      padding: 10px 30px;
      background: transparent;
      border: 2px solid #1a3a6b;
      color: #8ab5d4;
      font-family: 'Noto Serif JP', serif;
      font-size: 14px;
      letter-spacing: 4px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
    }
    .go-btn:hover {
      background: rgba(26,58,107,0.2);
      color: #d0e0f0;
    }
    .footer {
      text-align: center;
      padding: 15px 10px;
      margin-top: 25px;
      border-top: 2px solid #1a2a3a;
      font-size: 11px;
      color: #4a6a8a;
      letter-spacing: 2px;
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border: 1px solid #1a2a3a;
      font-size: 9px;
      letter-spacing: 2px;
      color: #5a7a9a;
      background: rgba(3,5,10,0.4);
    }
    @media (max-width: 600px) {
      .nav a { font-size: 11px; margin: 2px 4px; }
      #gameCanvas { width: 100%; height: auto; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="jpattern-top"></div>

  <div class="header">
    <h1>禅 SHOOTER</h1>
    <p class="sub">— ZenOffice Top-Down Shooter —</p>
  </div>

  <div class="nav">
    <a href="zork2.html">【 ZEN HOME 】</a>
    <a href="zorkmusic2.html">【 禅 音楽 】</a>
    <a href="zenplay2.html">【 禅 PLAY 】</a>
    <a href="zenhaiku2.html">【 禅 HAIKU 】</a>
    <a href="zorkshooter2.html">【 禅 SHOOTER 】</a>
    <a class="nav-btn" href="zorkshooter.html" title="ZorkShooter (hele)">☀</a>
    <a class="flag-btn" href="index2.html" title="ZenOffice">🇪🇪</a>
    <audio id="bgm" loop src="585.mp3"></audio>
    <audio id="gom" loop src="gom.mp3"></audio>
  </div>

  <div class="game-section">
    <div class="game-wrap" style="position:relative">
      <div class="game-title">〜 シューティング 〜</div>
      <div class="hud">
        <span class="hud-score">SCORE: <span id="scoreDisplay">0</span></span>
        <span class="hud-wave">WAVE <span id="waveDisplay">1</span></span>
        <span class="hud-hp">HP: <span id="hpDisplay">5</span></span>
      </div>
      <div class="game-canvas-wrap">
        <canvas id="gameCanvas" width="560" height="420"></canvas>
      </div>
      <div class="hud-controls">WASD / nooleklahvid — liigu &nbsp;|&nbsp; Hiir — sihi &nbsp;|&nbsp; Vasak klikk / Space — tulista</div>

      <div class="game-over-overlay" id="gameOverlay">
        <div class="go-title">GAME OVER</div>
        <div class="go-score">SCORE: <span id="finalScore">0</span></div>
        <div class="go-score" style="font-size:12px;color:#5a7a9a">WAVE <span id="finalWave">1</span></div>
        <button class="go-btn" id="restartBtn">☯ 新生</button>
      </div>
    </div>
  </div>

  <div class="gif-row" style="margin:15px 0">
    <img class="gif-inline" src="https://blob.gifcities.org/gifcities/FACUTSNQ3ALNV5NR323A3A2XBKVE5S2J.gif" alt="Made with" width="88" height="31">
    <img class="gif-inline" src="https://blob.gifcities.org/gifcities/5X2MBWLYTHAEGGZWZYNGLIOPRFOBPYZ7.gif" alt="Game" width="68" height="50">
    <img class="gif-inline" src="https://blob.gifcities.org/gifcities/3JAD54YMBBV4DWDXQRHUCXMRTTYEM3IQ.gif" alt="Button" width="88" height="31">
  </div>

  <div class="footer">
    <div class="gif-row">
      <span class="badge">禪</span>
      <span class="badge">SHOOT</span>
      <span class="badge">武</span>
    </div>
    <p style="margin:8px 0 0">ZenOffice SHOOTER — 狙いを定めて</p>
  </div>

  <div class="jpattern-top" style="margin-top:5px"></div>
</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = 560, H = 420;

  let player, bullets, enemies, particles;
  let score, wave, hp, gameRunning, frameId, spawnTimerId;
  let keys = {}, mouseX = W/2, mouseY = H/2;
  let enemySpawnInterval;
  let waveTimer, spawnCooldown;

  function init() {
    player = { x: W/2, y: H/2, r: 10, speed: 3.5, invuln: 0, hp: 5 };
    bullets = [];
    enemies = [];
    particles = [];
    score = 0;
    wave = 1;
    hp = 5;
    gameRunning = true;
    enemySpawnInterval = 2200;
    waveTimer = 0;
    spawnCooldown = 0;
    document.getElementById('scoreDisplay').textContent = '0';
    document.getElementById('waveDisplay').textContent = '1';
    document.getElementById('hpDisplay').textContent = '5';
    document.getElementById('gameOverlay').classList.remove('show');
    if (frameId) cancelAnimationFrame(frameId);
    if (spawnTimerId) { clearInterval(spawnTimerId); spawnTimerId = null; }
    loop();
  }

  function spawnEnemy() {
    if (!gameRunning) return;
    const side = Math.floor(Math.random() * 4);
    let x, y;
    if (side === 0) { x = Math.random() * W; y = -20; }
    else if (side === 1) { x = W + 20; y = Math.random() * H; }
    else if (side === 2) { x = Math.random() * W; y = H + 20; }
    else { x = -20; y = Math.random() * H; }

    const speed = 0.3 + Math.random() * 0.2 + (wave - 1) * 0.04;
    const size = 8 + Math.random() * 6;
    const ehp = 1;
    enemies.push({
      x, y, r: size, speed, hp: ehp, maxHp: ehp,
      type: Math.random() < 0.35 ? 'fast' : 'normal',
      wave: wave
    });
  }

  function spawnParticles(x, y, color, count, speed) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = Math.random() * speed + 0.5;
      particles.push({
        x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 30 + Math.random() * 20, maxLife: 50, color, r: 1.5 + Math.random() * 2
      });
    }
  }

  function shoot(targetX, targetY) {
    if (!gameRunning) return;
    const a = Math.atan2(targetY - player.y, targetX - player.x);
    const speed = 7;
    for (let i = -1; i <= 1; i++) {
      const spread = i * 0.08;
      bullets.push({
        x: player.x, y: player.y,
        vx: Math.cos(a + spread) * speed,
        vy: Math.sin(a + spread) * speed,
        r: 2.5, life: 60
      });
    }
  }

  function update() {
    if (!gameRunning) return;

    waveTimer++;
    if (waveTimer > 60 * 25) {
      wave++;
      waveTimer = 0;
      document.getElementById('waveDisplay').textContent = wave;
      enemySpawnInterval = Math.max(800, enemySpawnInterval - 150);
      const bonus = wave * 5;
      score += bonus;
      document.getElementById('scoreDisplay').textContent = score;
    }

    if (player.invuln > 0) player.invuln--;

    let dx = 0, dy = 0;
    if (keys['w'] || keys['arrowup']) dy = -1;
    if (keys['s'] || keys['arrowdown']) dy = 1;
    if (keys['a'] || keys['arrowleft']) dx = -1;
    if (keys['d'] || keys['arrowright']) dx = 1;
    if (dx && dy) { dx *= 0.707; dy *= 0.707; }
    player.x += dx * player.speed;
    player.y += dy * player.speed;
    player.x = Math.max(player.r, Math.min(W - player.r, player.x));
    player.y = Math.max(player.r, Math.min(H - player.r, player.y));

    spawnCooldown--;
    if (spawnCooldown <= 0 && enemies.length < 12 + wave * 3) {
      const count = Math.min(1 + Math.floor(wave / 3), 4);
      for (let i = 0; i < count; i++) spawnEnemy();
      spawnCooldown = enemySpawnInterval / (1000 / 60);
    }

    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;
      b.life--;
      if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
        bullets.splice(i, 1);
        continue;
      }
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        const d = Math.hypot(b.x - e.x, b.y - e.y);
        if (d < b.r + e.r) {
          e.hp--;
          spawnParticles(b.x, b.y, '#8ab5d4', 3, 1.5);
          bullets.splice(i, 1);
          if (e.hp <= 0) {
            const pts = 5 + Math.floor(wave / 2);
            score += pts;
            document.getElementById('scoreDisplay').textContent = score;
            spawnParticles(e.x, e.y, '#3a7ab5', 8, 2);
            enemies.splice(j, 1);
          }
          break;
        }
      }
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const a = Math.atan2(player.y - e.y, player.x - e.x);
      const spd = e.type === 'fast' ? e.speed * 2.5 : e.speed;
      e.x += Math.cos(a) * spd;
      e.y += Math.sin(a) * spd;

      const d = Math.hypot(e.x - player.x, e.y - player.y);
      if (d < e.r + player.r && player.invuln === 0) {
        hp--;
        document.getElementById('hpDisplay').textContent = hp;
        player.invuln = 50;
        spawnParticles(player.x, player.y, '#d0e0f0', 10, 2);
        if (hp <= 0) { gameOver(); return; }
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.life--;
      if (p.life <= 0) { particles.splice(i, 1); }
    }
  }

  function draw() {
    ctx.fillStyle = '#040810';
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = '#0a1020';
    ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 40) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
    }
    for (let i = 0; i < H; i += 40) {
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
    }

    particles.forEach(p => {
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    enemies.forEach(e => {
      const hpRatio = e.hp / e.maxHp;
      ctx.fillStyle = hpRatio > 0.5 ? '#3a7ab5' : '#1a3a6b';
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#2a3a5a';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.fillStyle = '#c8d8e8';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('✕', e.x, e.y + 2.5);

      if (e.hp < e.maxHp) {
        const bw = e.r * 2;
        ctx.fillStyle = '#1a2a3a';
        ctx.fillRect(e.x - bw/2, e.y - e.r - 5, bw, 3);
        ctx.fillStyle = '#3a7ab5';
        ctx.fillRect(e.x - bw/2, e.y - e.r - 5, bw * hpRatio, 3);
      }
    });

    bullets.forEach(b => {
      ctx.fillStyle = '#d0e0f0';
      ctx.shadowColor = '#d0e0f0';
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    if (player.invuln > 0 && Math.floor(player.invuln / 3) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }
    ctx.fillStyle = '#d0e0f0';
    ctx.beginPath();
    const px = player.x, py = player.y, pr = player.r;
    ctx.moveTo(px + pr, py);
    ctx.lineTo(px - pr * 0.6, py - pr * 0.7);
    ctx.lineTo(px - pr * 0.6, py + pr * 0.7);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;

    const a = Math.atan2(mouseY - player.y, mouseX - player.x);
    ctx.strokeStyle = 'rgba(200,220,255,0.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 6]);
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(player.x + Math.cos(a) * 80, player.y + Math.sin(a) * 80);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#3a7ab5';
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  function loop() {
    if (!gameRunning) return;
    update();
    draw();
    frameId = requestAnimationFrame(loop);
  }

  function gameOver() {
    gameRunning = false;
    if (frameId) cancelAnimationFrame(frameId);
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalWave').textContent = wave;
    document.getElementById('gameOverlay').classList.add('show');
    bgm.pause();
    document.getElementById('gom').play();
  }

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (W / rect.width);
    mouseY = (e.clientY - rect.top) * (H / rect.height);
  });

  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (W / rect.width);
    const y = (e.clientY - rect.top) * (H / rect.height);
    shoot(x, y);
  });

  document.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === ' ') { e.preventDefault(); shoot(mouseX, mouseY); }
  });
  document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  document.getElementById('restartBtn').addEventListener('click', () => {
    if (frameId) cancelAnimationFrame(frameId);
    document.getElementById('gom').pause();
    document.getElementById('gom').currentTime = 0;
    init();
    bgm.currentTime = 0;
    bgm.play();
  });

  const bgm = document.getElementById('bgm');
  bgm.loop = true;
  bgm.addEventListener('ended', () => bgm.play());
  const gom = document.getElementById('gom');
  gom.loop = true;
  gom.addEventListener('ended', () => gom.play());

  document.addEventListener('click', () => { bgm.play().catch(()=>{}); }, { once: true });

  init();
</script>

</body>
</html>
